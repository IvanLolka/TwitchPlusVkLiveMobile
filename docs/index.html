<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OmniStream OAuth Redirect</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(560px, 100%);
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 20px; }
    p { margin: 0; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #14b8a6;
      color: #06211f;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting to OmniStream</h1>
    <p>If the app did not open automatically, tap the button below.</p>
    <a id="openAppBtn" class="btn" href="#">Open OmniStream</a>
  </div>

  <script>
    (function () {
      var suffix = window.location.hash || window.location.search || "";
      var deepLink = "omnistream://oauth/twitch" + suffix;
      var openAppBtn = document.getElementById("openAppBtn");
      openAppBtn.href = deepLink;
      openAppBtn.onclick = function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      };

      window.location.replace(deepLink);
    })();
  </script>
</body>
</html>
